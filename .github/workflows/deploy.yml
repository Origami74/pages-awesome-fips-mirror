# Mirror awesome.fips.network (the nsite) to this repo's GitHub Pages.
#
# All the actual work — install nsyte, download, publish — lives in the
# external deploy-nsite-to-pages action. This workflow is the entry point:
# triggers, permissions, and the FIPS-specific defaults.
#
# Manual dispatch accepts overrides for one-off mirrors of other nsites.

name: Mirror nsite to Pages

# Default: mirror the FIPS publisher's "awesome" named nsite (kind 35128).
# Overridable via dispatch inputs. The Blossom server list is hardcoded
# until the publisher's kind-10063 server-list event is gossiped widely; once
# nsyte can discover servers via NIP-65-style lookup, this can be dropped.
env:
  AWESOME_FIPS_NPUB: npub1y0gja7r4re0wyelmvdqa03qmjs62rwvcd8szzt4nf4t2hd43969qj000ly
  AWESOME_FIPS_NAME: awesome
  AWESOME_FIPS_SERVERS: https://cdn.hzrd149.com,https://blossom.primal.net

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      pubkey:
        description: "Override pubkey (npub, hex, or NIP-05)"
        required: false
        type: string
      name:
        description: "Override named-nsite name (leave blank for root)"
        required: false
        type: string
  push:
    branches: [main]
    paths:
      - ".github/workflows/deploy.yml"

# Newest deploy wins; older runs cancel so we never publish a stale snapshot
# over a fresher one.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  mirror:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.mirror.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - id: mirror
        # TODO: replace Origami74 with the GitHub user/org that hosts the
        # deploy-nsite-to-pages repo, and pin to a tagged release once cut.
        uses: Origami74/deploy-nsite-to-pages@main
        with:
          pubkey: ${{ inputs.pubkey || env.AWESOME_FIPS_NPUB }}
          name: ${{ inputs.name || env.AWESOME_FIPS_NAME }}
          servers: ${{ env.AWESOME_FIPS_SERVERS }}
